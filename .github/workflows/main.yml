name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify Java version
        run: |
          java -version
          javac -version

      - name: Build Web Project
        run: npm run build

      - name: Setup Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Inject Firebase google-services.json (optional)
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          echo "Firebase config injected."

      - name: Generate App Icons and Splash Screens
        run: npx @capacitor/assets generate --android




      - name: Build Android APK
        run: |
          cd android
          ./gradlew --version
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
